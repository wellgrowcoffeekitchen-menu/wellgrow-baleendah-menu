<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wellgrow Menu</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
}

img{
    width:100%;
    display:block;
}

/* logo */

/* Floating Menu */

.fab{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:999;
}

.main-button{
    width:50px;
    height:50px;
    border-radius:50%;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    transition:.25s ease;
}

.main-button:hover{
    transform:scale(1.06);
}

.main-button img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.menu-item{
    width:44px;
    height:44px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:20px;
    margin-bottom:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.2);

    opacity:0;
    transform:translateY(20px);
    pointer-events:none;

    transition:.25s ease;
}

.fab.open .menu-item{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

</style>

</head>

<body>

<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">
<img src="9.png">
<img src="10.png">
<img src="11.png">
<img src="12.png">
<img src="13.png">

<div class="fab" id="fab">

    <a class="menu-item"
       href="#"
       onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
       ⬆
    </a>

    <a class="menu-item"
       href="https://share.google/YSjF7dEFzJCeKEadr"
       target="_blank">
       📍
    </a>

    <a class="menu-item"
       href="https://instagram.com/Wellgrow.coffee"
       target="_blank">
       📷
    </a>

    <a class="menu-item"
       href="https://wa.me/6281212898383"
       target="_blank">
       💬
    </a>

    <div class="main-button" id="mainButton">
        <img src="logo.png" alt="Wellgrow">
    </div>

</div>

</body>
</html>
