<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wellgrow Menu</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
}

img{
    width:100%;
    display:block;
}

/* logo */

.wellgrow-logo{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.35);
    z-index:999;
    transition:.3s;
}

.wellgrow-logo:hover{
    transform:scale(1.08);
}

.wellgrow-logo img{
    width:100%;
    display:block;
}

</style>

</head>

<body>

<!-- logo Wellgrow -->

    <img src="logo.png" alt="Wellgrow">
</a>

</body>
</html>
